---
name: Build and test the nightly legate profiler

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref-sha:
        description: 'The Full-commit SHA to checkout. Default=HEAD'
        required: false
        default: ''
      ci-verbose:
        description: 'Print full CI diagnostics and uncapped artifact summaries'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '0 22 * * 0'  # Weekly Sunday at 10:00 PM

jobs:
  build-and-test-legate-profiler:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux
          - linux-aarch64
        target-device:
          - cpu
        python-version:
          - "3.14"
    uses:
      ./.github/workflows/gh-build-and-test-legate-profiler.yml
    with:
      platform: ${{ matrix.platform }}
      ref-sha: ${{ github.event.inputs.ref-sha }}
      build-type: nightly
      python-version: ${{ matrix.python-version }}
      target-device: ${{ matrix.target-device }}
      network: "ucx"
      refname: ${{ github.ref_name }}
      event_name: ${{ github.event_name }}
      default-branch: ${{ github.event.repository.default_branch }}
      ci-verbose: ${{ github.event_name == 'workflow_dispatch' && inputs.ci-verbose || false }}
    secrets: inherit

  profiler-tests-pass:
    if: always()
    needs:
      - build-and-test-legate-profiler
    runs-on: linux-amd64-cpu4
    timeout-minutes: 15
    steps:
      - name: Check job results
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
