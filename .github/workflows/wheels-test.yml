on:
  workflow_call:
    inputs:
      build-type:
        required: true
        type: string
      branch:
        type: string
      date:
        type: string
      sha:
        type: string
      repo:
        type: string
      node_type:
        type: string
        default: "cpu16"
      script:
        type: string
        default: "continuous_integration/scripts/test_wheel_linux.bash"
      matrix_filter:
        type: string
        default: "."

defaults:
  run:
    shell: bash -eou pipefail {0}

permissions:
  actions: read
  checks: none
  contents: read
  deployments: none
  discussions: none
  id-token: write
  issues: none
  packages: read
  pages: none
  pull-requests: read
  repository-projects: none
  security-events: none
  statuses: none

jobs:
  compute-matrix:
    runs-on: linux-amd64-cpu4
    timeout-minutes: 15
    outputs:
      MATRIX: ${{ steps.compute-matrix.outputs.MATRIX }}
    steps:
      - name: Compute Build Matrix
        id: compute-matrix
        run: |
          set -eo pipefail

          # please keep the matrices sorted in ascending order by the following:
          #
          #     [ARCH, CUDA_VER, PY_VER, GPU, LINUX_VER]
          #
          export MATRIX="
          # amd64
          - { ARCH: 'amd64', CUDA_VER: '12.2.2', PY_VER: '3.11', GPU: 'l4', LINUX_VER: 'ubuntu22.04' }
          - { ARCH: 'amd64', CUDA_VER: '12.8.0', PY_VER: '3.12', GPU: 'l4', LINUX_VER: 'ubuntu22.04' }
          - { ARCH: 'amd64', CUDA_VER: '12.9.1', PY_VER: '3.13', GPU: 'l4', LINUX_VER: 'ubuntu24.04' }
          - { ARCH: 'amd64', CUDA_VER: '13.0.0', PY_VER: '3.11', GPU: 'l4', LINUX_VER: 'ubuntu24.04' }
          - { ARCH: 'amd64', CUDA_VER: '13.1.0', PY_VER: '3.12', GPU: 'l4', LINUX_VER: 'ubuntu24.04' }
          - { ARCH: 'amd64', CUDA_VER: '13.2.0', PY_VER: '3.13', GPU: 'l4', LINUX_VER: 'ubuntu24.04' }
          # arm64
          "

          MATRIX="$(
            yq -n -o json 'env(MATRIX)' | \
            jq -c '${{ inputs.matrix_filter }} | if (. | length) > 0 then {include: .} else "Error: Empty matrix\n" | halt_error(1) end'
          )"

          echo "MATRIX=${MATRIX}" | tee --append "${GITHUB_OUTPUT}"
  test:
    name: ${{ matrix.ARCH }}, ${{ matrix.CUDA_VER }}, py${{ matrix.PY_VER }}, ${{ matrix.LINUX_VER }}, ${{ matrix.GPU }}
    needs: compute-matrix
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.compute-matrix.outputs.MATRIX) }}
    runs-on: "linux-${{ matrix.ARCH }}-gpu-${{ matrix.GPU }}-latest-1"
    container:
      image: rapidsai/citestwheel:cuda${{ matrix.CUDA_VER }}-${{ matrix.LINUX_VER }}-py${{ matrix.PY_VER }}
      env:
        NVIDIA_VISIBLE_DEVICES: ${{ env.NVIDIA_VISIBLE_DEVICES }}
    steps:
      - name: Telemetry setup
        uses: rapidsai/shared-actions/telemetry-dispatch-setup@main
        continue-on-error: true
        if: ${{ vars.TELEMETRY_ENABLED == 'true' && github.run_attempt == '1' }}
        with:
          extra_attributes: "legate.PACKAGER=conda,legate.CUDA_VER=${{ matrix.CUDA_VER }},legate.PY_VER=${{ matrix.PY_VER }},legate.ARCH=${{ matrix.ARCH }},legate.LINUX_VER=${{ matrix.LINUX_VER }}"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Get the SHA
        id: get-sha
        run: |
          sha="$(echo ${{github.sha}} | head -c 10)"
          echo "sha=${sha}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.sha }}
          fetch-depth: 0

      - name: Add default paths to the env
        run: |
          # The || true is to satisfy the linting check, seems less readable to me.
          echo "$(pwd)/continuous_integration/scripts/tools" >> "${GITHUB_PATH}" || true

      - name: Run nvidia-smi to make sure GPU is working
        run: nvidia-smi

      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        continue-on-error: true
        # Skip the cache on RDS Lab nodes
        if: ${{ matrix.GPU != 'v100' && matrix.GPU != 'a100' }}

      - name: Extract CUDA major version
        env:
          CUDA_VER: ${{ matrix.CUDA_VER }}
        run: |
          cuda_major_ver="${CUDA_VER%%.*}"
          case "${cuda_major_ver}" in
            12|13) ;;
            *)
              echo "Unsupported CUDA major version: ${cuda_major_ver}" >&2
              exit 1
              ;;
          esac
          echo "CUDA_MAJOR_VER=${cuda_major_ver}" >> "${GITHUB_ENV}"

      - name: Download wheels from the build job
        uses: actions/download-artifact@v8
        env:
          BUILD_NAME: ${{ matrix.ARCH }}-cuda${{ env.CUDA_MAJOR_VER }}-py${{ matrix.PY_VER }}
        with:
          name: legate-wheel-${{ env.BUILD_NAME }}
          path: final-dist

      - name: Run tests
        run: ${{ inputs.script }}
      - name: Telemetry upload attributes
        uses: rapidsai/shared-actions/telemetry-dispatch-stash-job-artifacts@main
        continue-on-error: true
        if: ${{ vars.TELEMETRY_ENABLED == 'true' && github.run_attempt == '1' }}
        env:
          GH_TOKEN: ${{ github.token }}
