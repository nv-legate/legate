---
name: Build and test the legate profiler

concurrency:
  group: >-
    ${{
      (github.ref == 'refs/heads/main' || startsWith(github.ref_name, 'branch-')) &&
      format('{0}-{1}', github.workflow, github.run_id) ||
      format('{0}-{1}', github.workflow, github.ref_name)
    }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      ci-verbose:
        description: 'Print full CI diagnostics and uncapped artifact summaries'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - "pull-request/[0-9]+"
      - "branch-*"
      - "main"

jobs:
  build-and-test-legate-profiler:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux
          - linux-aarch64
        target-device:
          - cpu
        python-version:
          - "3.14"
    uses:
      ./.github/workflows/gh-build-and-test-legate-profiler.yml
    with:
      platform: ${{ matrix.platform }}
      build-type: ci
      python-version: ${{ matrix.python-version }}
      target-device: ${{ matrix.target-device }}
      network: "ucx"
      ci-verbose: ${{ github.event_name == 'workflow_dispatch' && inputs.ci-verbose || false }}
    secrets: inherit

  profiler-tests-pass:
    if: always()
    needs:
      - build-and-test-legate-profiler
    runs-on: linux-amd64-cpu4
    timeout-minutes: 15
    steps:
      - name: Check job results
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
