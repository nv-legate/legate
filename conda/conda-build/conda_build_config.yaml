---
build_mode_str:
  - debug
  - debug-sanitizer
  - release
  - release-debug

upload_enabled:
  - true
  - false

build_tests:
  - true
  - false

network:
  - ucx
  - gex

gpu_enabled:
  - true
  - false

python:
  - 3.11
  - 3.12
  - 3.13
  # Pin 3.14 to non-free-threaded CPython until cp314t dependency coverage lands.
  - "3.14.* *_cp314"

numpy_version:
  # Not 2.1.0 which segfaults on asarray() sometimes, see
  # https://github.com/numpy/numpy/pull/27249
  - ">=1.22,<2.5,!=2.1.0"

c_stdlib:
  - sysroot

c_stdlib_version:
  - "2.28"
cmake_version:
  - ">=3.26.4"

cuda_compiler:
  - cuda-nvcc

cython_version:
  # 3.2.6 triggers https://github.com/cython/cython/issues/7767
  # 3.2.7 contains 3.3 sources: https://github.com/cython/cython/issues/7781
  - ">=3.0.1,<3.3,!=3.2.6,!=3.2.7"

setuptools_scm_version:
  - ">=3.5.0,<10.3"

hdf5_version:
  - ">=1.14.4,<2.2"

openmpi_version:
  - ">=5,<6"

ucc_version:
  - ">=1.5.1,<1.9"

ucx_version:
  - ">=1.19.0,<1.21"

libcufile_version:
  - ">=1.0,<1.19"

nccl_version:
  # NCCL >=2.28 is required for ncclAlltoAll; keep this in sync
  # with the CMake NCCL version check.
  - ">=2.28,<2.31"
