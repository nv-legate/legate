[build-system]
requires = [
    "scikit-build-core",
    # 3.2.6 triggers https://github.com/cython/cython/issues/7767
    "cython>=3.0.1,!=3.2.6",
    "rich",
]
build-backend = "scikit_build_core.build"

[project]
name = "legate-cu12"
authors = [{name = "NVIDIA Corporation"}]
license = { text = "Apache-2.0" }
description = "legate - The Foundation for All Legate Libraries"
classifiers = [
    "Intended Audience :: Developers",
    "Topic :: Database",
    "Topic :: Scientific/Engineering",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
dependencies = [
    "numpy>=1.22,<2.5,!=2.1.0",
    "h5py",
    "rich",
    "nvidia-cufile-cu12; sys_platform == 'linux'",
    "nvidia-nccl-cu12>=2.28,<2.30; sys_platform == 'linux'",
]
dynamic = ["version"]
requires-python = ">=3.11"

[project.optional-dependencies]
test = [
    "coverage",
    "mock",
    "mypy>=0.961",
    "psutil",
    "nvidia-ml-py",
    "pytest-cov",
    "pytest",
    "pytest-mock",
    "jupyter_client",
    "openmpi",
    "h5py",
    "zarr>=2,<4",
]

[project.urls]
homepage = "https://github.com/nv-legate/legate"

[project.scripts]
legate = "legate.driver:main"
legate-issue = "legate.issue:main"
legate-jupyter = "legate.jupyter:main"
lgpatch = "legate.lgpatch:main"

[project.entry-points."cmake.prefix"]
legate = "legate"

[tool.scikit-build.cmake]
version = ">=3.26.4"
args = ["--log-level=VERBOSE", "--log-context"]

[tool.scikit-build.metadata.version]
provider = "scikit_build_core.metadata.setuptools_scm"

[tool.scikit-build.sdist]
include = [
    "../../../../src/python/legate/_version.py",
    "../../../../src/python/legate/install_info.py",
]

[tool.setuptools_scm]
write_to = "src/python/legate/_version.py"
root = "../../../.."

[tool.scikit-build.build]
verbose = true

[tool.scikit-build.logging]
level = "DEBUG"

[tool.scikit-build.wheel]
exclude = ["**.pyx", "**.pxd"]
install-dir = "legate"

[tool.scikit-build]
ninja.version = ">=1.11"
build-dir = "../../../../build/{wheel_tag}"

[tool.scikit-build.wheel.packages]
"legate" = "../../../../src/python/legate"
